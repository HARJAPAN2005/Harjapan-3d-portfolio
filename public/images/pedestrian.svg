<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="Pedestrian Detection & Tracking System">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06121f"/>
      <stop offset="1" stop-color="#01060d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg2)"/>
  <g fill="none" stroke="#41e0a3" stroke-opacity="0.07" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200 M0 600 H1200 M240 0 V750 M480 0 V750 M720 0 V750 M960 0 V750"/>
  </g>
  <!-- pedestrian figures as simple silhouettes -->
  <g fill="#ffffff" fill-opacity="0.18">
    <g transform="translate(400 360)">
      <circle cx="0" cy="-70" r="26"/>
      <rect x="-22" y="-40" width="44" height="100" rx="14"/>
      <rect x="-20" y="55" width="14" height="70" rx="6"/>
      <rect x="6" y="55" width="14" height="70" rx="6"/>
    </g>
    <g transform="translate(690 380)">
      <circle cx="0" cy="-70" r="26"/>
      <rect x="-22" y="-40" width="44" height="100" rx="14"/>
      <rect x="-20" y="55" width="14" height="70" rx="6"/>
      <rect x="6" y="55" width="14" height="70" rx="6"/>
    </g>
  </g>
  <!-- detection bounding boxes -->
  <g fill="none" stroke="#41e0a3" stroke-width="4">
    <rect x="330" y="245" width="150" height="270" rx="4"/>
    <rect x="620" y="265" width="150" height="270" rx="4"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#01060d">
    <rect x="330" y="218" width="120" height="28" fill="#41e0a3"/>
    <text x="340" y="239">person 0.94</text>
    <rect x="620" y="238" width="120" height="28" fill="#41e0a3"/>
    <text x="630" y="259">person 0.91</text>
  </g>
  <text x="80" y="120" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#41e0a3" letter-spacing="6">02</text>
  <text x="80" y="660" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="700" fill="#ffffff">Pedestrian Detection</text>
  <text x="80" y="710" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#ffffff" fill-opacity="0.6">YOLO + DeepSORT Tracking System</text>
</svg>
